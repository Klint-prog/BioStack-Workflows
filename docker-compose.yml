x-service-defaults: &service_defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    <<: *service_defaults
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-biostack}
      POSTGRES_USER: ${POSTGRES_USER:-biostack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biostack}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biostack} -d ${POSTGRES_DB:-biostack}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - biostack_postgres_data:/var/lib/postgresql/data

  redis:
    <<: *service_defaults
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - biostack_redis_data:/data

  backend:
    <<: *service_defaults
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: biostack-workflows-backend:v0.2.0
    env_file:
      - .env.example
    environment:
      BIOSTACK_WORKSPACE: /workspace
      BIOSTACK_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-biostack}:${POSTGRES_PASSWORD:-biostack}@postgres:5432/${POSTGRES_DB:-biostack}
      BIOSTACK_REDIS_URL: redis://redis:6379/0
      BIOSTACK_LOG_LEVEL: ${BIOSTACK_LOG_LEVEL:-INFO}
    volumes:
      - biostack_workspace:/workspace
    working_dir: /workspace
    healthcheck:
      test: ["CMD", "biostack", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    <<: *service_defaults
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: biostack-workflows-backend:v0.2.0
    env_file:
      - .env.example
    environment:
      BIOSTACK_WORKSPACE: /workspace
      BIOSTACK_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-biostack}:${POSTGRES_PASSWORD:-biostack}@postgres:5432/${POSTGRES_DB:-biostack}
      BIOSTACK_REDIS_URL: redis://redis:6379/0
      BIOSTACK_CORS_ORIGINS: ${BIOSTACK_CORS_ORIGINS:-http://localhost:8969,http://localhost:8970}
      BIOSTACK_LOG_LEVEL: ${BIOSTACK_LOG_LEVEL:-INFO}
    volumes:
      - biostack_workspace:/workspace
    working_dir: /app
    command: sh -c "alembic upgrade head && uvicorn biostack.api.app:app --host 0.0.0.0 --port 8000 --log-level ${UVICORN_LOG_LEVEL:-info}"
    ports:
      - "${API_PORT:-8971}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    <<: *service_defaults
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    image: biostack-workflows-worker:v0.2.0
    env_file:
      - .env.example
    environment:
      BIOSTACK_WORKSPACE: /workspace
      BIOSTACK_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-biostack}:${POSTGRES_PASSWORD:-biostack}@postgres:5432/${POSTGRES_DB:-biostack}
      BIOSTACK_REDIS_URL: redis://redis:6379/0
      BIOSTACK_LOG_LEVEL: ${BIOSTACK_LOG_LEVEL:-INFO}
    volumes:
      - biostack_workspace:/workspace
    working_dir: /workspace
    command: biostack-worker
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; import redis; r=redis.Redis.from_url(os.environ.get('BIOSTACK_REDIS_URL', 'redis://redis:6379/0')); r.ping()\""]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    <<: *service_defaults
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    image: biostack-workflows-frontend:v0.2.0
    expose:
      - "80"
    ports:
      - "${FRONTEND_PORT:-8970}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      api:
        condition: service_healthy

  nginx:
    <<: *service_defaults
    image: nginx:1.27-alpine
    ports:
      - "${PLATFORM_PORT:-8969}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/v1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  biostack_workspace:
  biostack_postgres_data:
  biostack_redis_data:
