services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: biostack
      POSTGRES_USER: biostack
      POSTGRES_PASSWORD: biostack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biostack -d biostack"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - biostack_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: biostack-workflows-backend:phase-11
    env_file:
      - .env.example
    environment:
      BIOSTACK_WORKSPACE: /workspace
      BIOSTACK_DATABASE_URL: postgresql+psycopg://biostack:biostack@postgres:5432/biostack
    volumes:
      - biostack_data:/workspace
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: biostack-workflows-backend:phase-11
    env_file:
      - .env.example
    environment:
      BIOSTACK_WORKSPACE: /workspace
      BIOSTACK_DATABASE_URL: postgresql+psycopg://biostack:biostack@postgres:5432/biostack
    volumes:
      - biostack_data:/workspace
    working_dir: /workspace
    command: uvicorn biostack.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  biostack_data:
  biostack_postgres_data:
